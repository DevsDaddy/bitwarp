<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Base Meta -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Welcome to BitWarp Networking client application demo. Use it only for education purposes.">
  <meta name="keywords" content="bitwarp,client,application,demo">
  <meta name="author" content="Elijah Rastorguev" />
  <meta name="robots" content="index,follow" />
  <title>BitWarp Application</title>
  <!-- Base Meta -->

  <!-- Styles -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.css" />
  <link rel="stylesheet" href="./assets/app.css" />
  <!-- Styles -->
</head>
<body>
  <!-- Application preloader -->
  <div id="preloader" class="app_loader blur-bg-10 smooth-500">
    <div></div>
    <span class="loader"></span>
    <div class="status" data-label="loading_state"></div>
  </div>
  <!-- Application preloader -->

  <!-- Application container -->
  <div id="application" class="app_container">
    <!-- TOP BAR -->
    <div class="app_header">
      <div class="connect" id="server_state">
        <div class="online_icon offline smooth-250"></div>
        <span data-label="connection"></span>
        <span data-label="ping"></span>
      </div>
      <div class="connection">
        <div class="inner_icon hidden" data-component="secured_icon" id="secured_connection">
          <span class="material-symbols-outlined font-green active">shield_locked</span>
        </div>
        <div class="inner_icon hidden" data-component="unsecured_icon" id="unsecured_connection">
          <span class="material-symbols-outlined font-red active">gpp_bad</span>
        </div>
        <div class="inner_icon hidden" data-component="compressed_icon" id="compressed_connection">
          <span class="material-symbols-outlined font-green active">compress</span>
        </div>
        <div class="inner_icon hidden" data-component="uncompressed_icon" id="uncompressed_connection">
          <span class="material-symbols-outlined font-red active">raw_on</span>
        </div>
        <div class="inner_icon hidden" data-component="slow_network_icon" id="slow_network">
          <span class="material-symbols-outlined font-red active">speed</span>
        </div>
        <div class="url" data-label="url" id="server_url"></div>
      </div>
    </div>
    <!-- TOP BAR -->

    <!-- APP CONTENT -->
    <div class="app_content hidden" data-layout="app_content">
      <!-- WELCOME VIEW -->
      <div class="app_view centred hidden gap-10" data-view="welcome">
        <div class="welcome_form">
          <section class="centred flex flex-column">
            <h3>Welcome to <span class="welcome-head">BitWarp Demo</span></h3>
            <p>Join or create a space to get started</p>
          </section>
          <section class="join_form flex-nowrap flex flex-column gap-10 centred w-full">
            <div class="flex flex-row flex-nowrap gap-5 w-full">
              <input type="text" class="field w-full" placeholder="Enter the code" id="room_code" required maxlength="50" />
              <button class="btn primary" id="join_room">Join</button>
            </div>
            <p class="mt-20 mb-20">— OR —</p>
            <div class="flex flex-row flex-nowrap gap-5 w-full centred">
              <button class="btn secondary w-full" id="create_room">Create new space</button>
            </div>
          </section>
        </div>
      </div>
      <!-- WELCOME VIEW -->

      <!-- CREATE ROOM INFO -->
      <div class="app_view centred hidden gap-10" data-view="create_room">
        <div class="welcome_form">
          <section class="centred flex flex-column">
            <h3>Create a new space</h3>
            <p>Let's create a new collaboration space.</p>
          </section>
          <section class="join_form flex-nowrap flex flex-column gap-10 centred w-full">
            <div class="flex flex-row flex-nowrap gap-5 w-full">
              <input type="text" class="field w-full" placeholder="Enter the room name" id="room_name" maxlength="50" />
            </div>
            <div class="flex flex-row flex-nowrap gap-5 w-full">
              <textarea id="room_description" class="field w-full" placeholder="Enter the room description"></textarea>
            </div>
            <div class="flex flex-row flex-nowrap gap-5 w-full mb-10 mt-10">
              <input type="text" class="field w-full" placeholder="Create room password" id="room_create_pass" maxlength="50" />
            </div>
            <div class="flex flex-row flex-nowrap gap-5 w-full centred">
              <div class="toggle w-full">
                <input type="checkbox" id="private_space">
                <label for="private_space" id="private_space_hint">Create a private space</label>
              </div>
            </div>
            <div class="flex flex-row flex-nowrap gap-5 w-full centred mt-20">
              <button class="btn primary w-full" id="request_room_creation">Create space</button>
            </div>
          </section>
        </div>
      </div>
      <!-- CREATE ROOM INFO -->

      <!-- PEER INFO VIEW -->
      <div class="app_view centred hidden gap-10" data-view="peer_info">
        <div class="welcome_form">
          <section class="centred flex flex-column">
            <h3>Introduce yourself</h3>
            <p>Before we get started, tell us a little about yourself</p>
          </section>
          <section class="join_form flex-nowrap flex flex-column gap-10 centred w-full">
            <div class="flex flex-row flex-nowrap gap-5 w-full">
              <input type="text" class="field w-full" placeholder="Please, type your name" id="peer_name" required maxlength="50" />
            </div>
            <div class="flex flex-row flex-nowrap gap-5 mt-20 centred w-full">
              <button class="btn primary w-full" id="change_info">Save my info</button>
            </div>
          </section>
        </div>
      </div>
      <!-- PEER INFO VIEW -->
    </div>
    <!-- APP CONTENT -->
  </div>
  <!-- Application container -->

  <!-- Application scripts -->
  <script src="https://s3.twcstorage.ru/e1c4c0e1-main-cdn/dotlottie-player.mjs" type="module"></script>
  <script src="https://code.jquery.com/jquery-4.0.0.min.js" integrity="sha256-OaVG6prZf4v69dPg6PhVattBXkcOWQB62pdZ3ORyrao=" crossorigin="anonymous"></script>
  <script src="https:////cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.js"></script>
  <script src="https://unpkg.com/@popperjs/core@2"></script>
  <script src="https://unpkg.com/tippy.js@6"></script>
  <script src="./app.ts" type="module"></script>
  <!-- Application scripts -->
</body>
</html>
